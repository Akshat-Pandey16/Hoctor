services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hoctor
      POSTGRES_USER: hoctor
      POSTGRES_PASSWORD: hoctor
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoctor -d hoctor"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-please-change-me-this-is-not-safe}
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8000}
      DJANGO_SECURE_SSL_REDIRECT: "false"
      DJANGO_SECURE_HSTS_SECONDS: "0"
      DATABASE_URL: postgres://hoctor:hoctor@db:5432/hoctor
      HOCTOR_SCANNER_BACKEND: mock
      HOCTOR_MODEL_DIR: /app/models
    ports:
      - "8000:8000"
    volumes:
      - models:/app/models
      - media:/app/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application
                --bind 0.0.0.0:8000
                --workers 3
                --access-logfile -
                --error-logfile -"

volumes:
  pgdata:
  models:
  media:
