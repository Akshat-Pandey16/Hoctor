name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: uv run pytest --cov=hoctor --cov=config --cov-report=term-missing

      - name: Django system checks (prod)
        env:
          DJANGO_SETTINGS_MODULE: config.settings.prod
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_ALLOWED_HOSTS: example.com
          DJANGO_SECURE_SSL_REDIRECT: "false"
          DJANGO_SECURE_HSTS_SECONDS: "0"
          DATABASE_URL: sqlite:///ci.sqlite3
        run: uv run python manage.py check --deploy --fail-level WARNING || true

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t hoctor:ci .
